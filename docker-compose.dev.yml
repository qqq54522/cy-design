services:
  # ── 后端：热重载 + 源码挂载 ─────────────────────────────

  platform-api:
    build:
      target: dev
    ports:
      - "8100:8100"
    volumes:
      - ./platform_api:/app
    environment:
      - WATCHFILES_FORCE_POLLING=true

  content-backend:
    build:
      target: dev
    ports:
      - "8001:8001"
    volumes:
      - "./素材抓取/content-marketing/backend:/app"
    environment:
      - WATCHFILES_FORCE_POLLING=true

  kv-backend:
    build:
      target: dev
    ports:
      - "8002:8002"
    volumes:
      - "./KV生成/backend:/app"
    environment:
      - WATCHFILES_FORCE_POLLING=true

  emoji-backend:
    build:
      target: dev
    ports:
      - "8003:8003"
    volumes:
      - "./表情包/backend:/app"
    environment:
      - WATCHFILES_FORCE_POLLING=true

  # ── 前端：Vite 开发服务器 + 源码挂载 ───────────────────

  hub-frontend:
    build:
      target: dev
    ports:
      - "5180:5180"
    volumes:
      - ./frontend:/app
      - hub_node_modules:/app/node_modules
    environment:
      - API_TARGET=http://platform-api:8100
      - CHOKIDAR_USEPOLLING=true

  content-frontend:
    build:
      target: dev
    ports:
      - "5174:5174"
    volumes:
      - "./素材抓取/content-marketing/frontend:/app"
      - content_node_modules:/app/node_modules
    environment:
      - API_TARGET=http://content-backend:8001
      - CHOKIDAR_USEPOLLING=true

  kv-frontend:
    build:
      target: dev
    ports:
      - "5175:5175"
    volumes:
      - "./KV生成/frontend:/app"
      - kv_node_modules:/app/node_modules
    environment:
      - API_TARGET=http://kv-backend:8002
      - CHOKIDAR_USEPOLLING=true

  emoji-frontend:
    build:
      target: dev
    ports:
      - "5176:5176"
    volumes:
      - "./表情包/frontend:/app"
      - emoji_node_modules:/app/node_modules
    environment:
      - API_TARGET=http://emoji-backend:8003
      - CHOKIDAR_USEPOLLING=true

volumes:
  hub_node_modules:
  content_node_modules:
  kv_node_modules:
  emoji_node_modules:
