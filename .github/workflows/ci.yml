name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 鈹€鈹€鈹€ 鍓嶇妫€鏌?鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  frontend:
    name: Frontend (workspace lint + typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # 鈹€鈹€鈹€ 鍚庣妫€鏌?鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r shared/requirements-dev.txt

      - name: Ruff lint
        run: ruff check platform_api/ shared/backend/ "KV鐢熸垚/backend/" "绱犳潗鎶撳彇/content-marketing/backend/" "琛ㄦ儏鍖?backend/"

      - name: Ruff format check
        run: ruff format --check platform_api/ shared/backend/ "KV鐢熸垚/backend/" "绱犳潗鎶撳彇/content-marketing/backend/" "琛ㄦ儏鍖?backend/"

      - name: Test platform_api
        working-directory: platform_api
        run: |
          pip install -r requirements.txt
          pytest tests/ -v

      - name: Test KV generator backend
        working-directory: 'KV鐢熸垚/backend'
        run: |
          pip install -r requirements.txt
          pytest tests/ -v

      - name: Test HotContent backend
        working-directory: '绱犳潗鎶撳彇/content-marketing/backend'
        run: |
          pip install -r requirements.txt
          pytest tests/ -v

      - name: Test Emoji generator backend
        working-directory: '琛ㄦ儏鍖?backend'
        run: |
          pip install -r requirements.txt
          pytest tests/ -v

  # 鈹€鈹€鈹€ Docker 鏋勫缓楠岃瘉锛堜粎楠岃瘉鑳藉惁鏋勫缓锛屼笉鎺ㄩ€侊級 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: |
          cp .env.example .env
          mkdir -p "绱犳潗鎶撳彇/content-marketing/backend"
          mkdir -p "KV鐢熸垚/backend"
          mkdir -p "琛ㄦ儏鍖?backend"
          touch "绱犳潗鎶撳彇/content-marketing/backend/.env"
          touch "KV鐢熸垚/backend/.env"
          touch "琛ㄦ儏鍖?backend/.env"

      - name: Verify docker-compose config
        run: docker compose config --quiet
