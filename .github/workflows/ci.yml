name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 前端检查 ───────────────────────────────────────────
  frontend:
    name: Frontend (lint + typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter lingqiao-hub-frontend lint

      - name: Type check
        run: pnpm --filter lingqiao-hub-frontend typecheck

      - name: Test
        run: pnpm --filter lingqiao-hub-frontend test

      - name: Build
        run: pnpm --filter lingqiao-hub-frontend build

  # ─── 后端检查 ───────────────────────────────────────────
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r shared/requirements-dev.txt

      - name: Ruff lint
        run: ruff check platform_api/ shared/backend/

      - name: Ruff format check
        run: ruff format --check platform_api/ shared/backend/

      - name: Test platform_api
        working-directory: platform_api
        run: |
          pip install -r requirements.txt
          pytest tests/ -v

  # ─── Docker 构建验证（仅验证能否构建，不推送） ──────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Verify docker-compose config
        run: docker compose config --quiet
