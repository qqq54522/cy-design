name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (workspace lint + typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter lingqiao-hub-frontend lint

      - name: Type check
        run: pnpm --filter lingqiao-hub-frontend typecheck

      - name: Test
        run: pnpm --filter lingqiao-hub-frontend test

      - name: Build
        run: pnpm --filter lingqiao-hub-frontend build

  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r shared/requirements-dev.txt

      - name: Ruff lint
        run: ruff check platform_api/ shared/backend/ "KV生成/backend/" "素材抓取/content-marketing/backend/" "表情包/backend/"

      - name: Ruff format check
        run: ruff format --check platform_api/ shared/backend/ "KV生成/backend/" "素材抓取/content-marketing/backend/" "表情包/backend/"

      - name: Test platform_api
        working-directory: platform_api
        run: |
          pip install -r requirements.txt
          pytest tests/ -v

      - name: Test KV generator backend
        working-directory: "KV生成/backend"
        run: |
          pip install -r requirements.txt
          pytest tests/ -v

      - name: Test HotContent backend
        working-directory: "素材抓取/content-marketing/backend"
        run: |
          pip install -r requirements.txt
          pytest tests/ -v

      - name: Test Emoji generator backend
        working-directory: "表情包/backend"
        run: |
          pip install -r requirements.txt
          pytest tests/ -v

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: |
          cp .env.example .env
          mkdir -p "素材抓取/content-marketing/backend"
          mkdir -p "KV生成/backend"
          mkdir -p "表情包/backend"
          touch "素材抓取/content-marketing/backend/.env"
          touch "KV生成/backend/.env"
          touch "表情包/backend/.env"

      - name: Verify docker-compose config
        run: docker compose config --quiet
